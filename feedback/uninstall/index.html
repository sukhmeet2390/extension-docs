<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>We're sorry to see you go - Amrita Labs</title>
<meta name="description" content="Help us improve with your feedback." />
<meta name="robots" content="noindex" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />

<body>

  <main class="feedback-page">
    <div class="feedback-card">
      <div class="icon">💬</div>
      <h1 id="heading">We're sorry to see you go</h1>
      <p id="subheading" class="sub">Your feedback helps us improve. Takes 30 seconds.</p>

      <form id="feedback-form">
        <input type="hidden" name="ext" id="field-ext" value="" />
        <input type="hidden" name="lang" id="field-lang" value="en" />

        <fieldset>
          <legend id="legend-reason">Why did you uninstall?</legend>
          <label><input type="radio" name="reason" value="not-working" /><span data-i18n="reason-not-working">It didn't work on my version</span></label>
          <label><input type="radio" name="reason" value="too-expensive" /><span data-i18n="reason-too-expensive">Too expensive</span></label>
          <label><input type="radio" name="reason" value="confusing" /><span data-i18n="reason-confusing">Confusing to use</span></label>
          <label><input type="radio" name="reason" value="found-alternative" /><span data-i18n="reason-found-alternative">Found a better alternative</span></label>
          <label><input type="radio" name="reason" value="just-testing" /><span data-i18n="reason-just-testing">Just testing, not needed</span></label>
          <label><input type="radio" name="reason" value="other" /><span data-i18n="reason-other">Other</span></label>
        </fieldset>

        <div class="textarea-wrap">
          <label for="feedback-text" id="label-feedback" data-i18n="label-feedback">What would bring you back? (optional)</label>
          <textarea id="feedback-text" name="feedback" rows="3" placeholder=""></textarea>
        </div>

        <div class="email-wrap">
          <label for="feedback-email" id="label-email" data-i18n="label-email">Email for follow-up (optional)</label>
          <input type="email" id="feedback-email" name="email" placeholder="" />
        </div>

        <button type="submit" id="btn-submit">Send Feedback</button>
      </form>

      <div id="thank-you" class="thank-you hidden">
        <div class="check">✓</div>
        <h2 id="ty-heading">Thank you!</h2>
        <p id="ty-sub">Your feedback helps us build a better product.</p>
      </div>
    </div>
  </main>

    'privacy-blur-whatsapp': 'Privacy Blur for WhatsApp',
    'privacy-blur-discord': 'Privacy Blur for Discord',
    'privacy-blur-teams': 'Privacy Blur for Teams',
    'gmail-subject-score': 'SubjectScore Pro for Gmail',
    'pinello': 'Pinello — Pinterest Pin Scorer',
  };

  // Read URL params
  const params = new URLSearchParams(window.location.search);
  const ext = params.get('ext') || '';
  const lang = (params.get('lang') || 'en').replace('-', '_');

  // Set hidden fields
  document.getElementById('field-ext').value = ext;
  document.getElementById('field-lang').value = lang;

  // Find best locale match
  const t = i18n[lang] || i18n[lang.split('_')[0]] || i18n.en;

  // Apply translations
  document.getElementById('heading').textContent = t.heading;
  document.getElementById('subheading').textContent = t.subheading;
  document.querySelector('legend').textContent = t.legend;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key]) el.textContent = t[key];
  });
  document.getElementById('label-feedback').textContent = t['label-feedback'];
  document.getElementById('label-email').textContent = t['label-email'];
  document.getElementById('btn-submit').textContent = t.submit;
  document.getElementById('ty-heading').textContent = t['ty-heading'];
  document.getElementById('ty-sub').textContent = t['ty-sub'];

  // Show extension name in subheading if available
  if (ext && extNames[ext]) {
    document.getElementById('subheading').textContent =
      extNames[ext] + ' — ' + t.subheading;
  }

  // Google Apps Script endpoint
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwYdSpggzYv3dhrDIl8AxSeH8Mha_8h0dd3jfdAsLD8lC1wC1eBb_PGjH95xpRIpg1Y/exec';

  // Form submission
  document.getElementById('feedback-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const reason = form.querySelector('input[name="reason"]:checked')?.value || '';
    const feedback = document.getElementById('feedback-text').value;
    const email = document.getElementById('feedback-email').value;

    if (!reason) {
      form.querySelector('legend').style.color = '#d32f2f';
      return;
    }

    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.textContent = '...';

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          ext,
          lang,
          reason,
          feedback,
          email,
          timestamp: new Date().toISOString(),
        }),
        mode: 'no-cors',
      });
    } catch { /* fire-and-forget */ }

    form.classList.add('hidden');
    document.querySelector('.icon').classList.add('hidden');
    document.getElementById('heading').classList.add('hidden');
    document.getElementById('subheading').classList.add('hidden');
    document.getElementById('thank-you').classList.remove('hidden');
  });
</script>

</body>
</html>
